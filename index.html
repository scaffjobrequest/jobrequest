<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scaffold Management System</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen">

  <!-- HEADER -->

  <header class="bg-slate-900 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

```

  </header>

  <!-- MAIN -->

  <main class="max-w-5xl mx-auto p-6">

```
<div class="bg-white rounded-xl shadow-sm p-6">

  <h2 class="text-xl font-bold text-slate-800 mb-6">
    Scaffold Request Form
  </h2>

  <form id="requestForm" class="space-y-6">

    <!-- REQUESTER -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

      <div>
        <label class="block text-sm font-semibold mb-2">
          Requester Name
        </label>

        <input
          type="text"
          id="requesterName"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">
          Department
        </label>

        <input
          type="text"
          id="department"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">
          Phone Number
        </label>

        <input
          type="text"
          id="phoneNumber"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >
      </div>

    </div>

    <!-- WORK -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <div>
        <label class="block text-sm font-semibold mb-2">
          Work Action
        </label>

        <select
          id="workAction"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >
          <option value="">Select</option>
          <option value="Install">Install</option>
          <option value="Remove">Remove</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">
          Work Type
        </label>

        <select
          id="workType"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >
          <option value="">Select</option>
          <option value="CM">CM</option>
          <option value="MSD">MSD</option>
          <option value="QSD">QSD</option>
          <option value="ANSD">ANSD</option>
          <option value="BD">BD</option>
        </select>
      </div>

    </div>

    <!-- DESCRIPTION -->
    <div>

      <label class="block text-sm font-semibold mb-2">
        Description
      </label>

      <input
        type="text"
        id="description"
        required
        class="w-full border border-slate-300 rounded-lg p-3"
      >

    </div>

    <!-- LOCATION -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <div>
        <label class="block text-sm font-semibold mb-2">
          Location
        </label>

        <select
          id="location"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >
          <option value="">Select</option>
          <option value="Internal">Internal</option>
          <option value="External">External</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">
          Area
        </label>

        <input
          type="text"
          id="area"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >
      </div>

    </div>

    <!-- CONTACT -->
    <div>

      <label class="block text-sm font-semibold mb-2">
        Contact
      </label>

      <input
        type="text"
        id="contact"
        required
        class="w-full border border-slate-300 rounded-lg p-3"
      >

    </div>

    <!-- DUE DATE -->
    <div>

      <label class="block text-sm font-semibold mb-2">
        Due Date
      </label>

      <input
        type="date"
        id="dueDate"
        required
        class="w-full border border-slate-300 rounded-lg p-3"
      >

    </div>

    <!-- REMARK -->
    <div>

      <label class="block text-sm font-semibold mb-2">
        Remark
      </label>

      <textarea
        id="remark"
        rows="4"
        class="w-full border border-slate-300 rounded-lg p-3"
      ></textarea>

    </div>

    <!-- BUTTON -->
    <div class="pt-4">

      <button
        type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold"
      >
        Submit Request
      </button>

    </div>

  </form>

</div>
```

  </main>

  <script>

    const API_URL = 'https://script.google.com/macros/s/AKfycbxCa6wt0E3lil1d38gGFb6_Oupmk1_CGMKYSQ2MUp6t52yYdfJq5rdunRPdhRxDjYUV/exec';

    document
      .getElementById('requestForm')
      .addEventListener('submit', async function(e) {

        e.preventDefault();

        const data = {
          requesterName:
            document.getElementById('requesterName').value,

          department:
            document.getElementById('department').value,

          phoneNumber:
            document.getElementById('phoneNumber').value,

          workAction:
            document.getElementById('workAction').value,

          workType:
            document.getElementById('workType').value,

          description:
            document.getElementById('description').value,

          location:
            document.getElementById('location').value,

          area:
            document.getElementById('area').value,

          contact:
            document.getElementById('contact').value,

          dueDate:
            document.getElementById('dueDate').value,

          remark:
            document.getElementById('remark').value
        };

        try {

          const response = await fetch(API_URL, {

            method: 'POST',

            body: JSON.stringify(data)

          });

          const result = await response.json();

          if(result.success) {

            alert(
              `Request Submitted Successfully\n\n` +
              `Job ID: ${result.jobId}\n\n` +
              `Please save this Job ID for tracking.`
            );

            document
              .getElementById('requestForm')
              .reset();

          } else {

            alert('Error submitting request');

          }

        } catch(error) {

          console.error(error);

          alert('System Error');

        }

      });

  </script>

</body>
</html>
