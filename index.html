<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Scaffold Management System</title>

  <script src="https://cdn.tailwindcss.com"></script>
<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
>

<link
  href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
>
</head>

<body class="bg-slate-100 min-h-screen font-[Prompt]">

  <!-- HEADER -->

  <header class="bg-slate-900 text-white shadow-lg">


<div class="max-w-7xl mx-auto px-6 py-4">

  <h1 class="text-2xl font-bold">
    Scaffold Management System
  </h1>

  <p class="text-slate-300 text-sm">
    Request & Approval Portal
  </p>

</div>


  </header>

  <!-- MAIN -->

  <main class="max-w-5xl mx-auto p-6">


<!-- HERO -->

<div class="text-center py-12">

  <h2 class="text-4xl font-bold text-slate-800 mb-4">
    Select Your Role
  </h2>

  <p class="text-slate-500 text-lg">
    Scaffold Request Workflow System
  </p>

</div>

<!-- ROLE CARDS -->

<div class="grid grid-cols-1 md:grid-cols-2 gap-8">

  <!-- REQUESTER -->

  <div
    onclick="goRequester()"
    class="bg-white rounded-2xl shadow-sm p-10 cursor-pointer hover:shadow-lg transition"
  >

    <div class="text-center">

      <div class="text-6xl mb-6">
        📝
      </div>

      <h3 class="text-2xl font-bold text-slate-800 mb-3">
        Requester
      </h3>

      <p class="text-slate-500">
        แจ้งงาน ตรวจสอบสถานะงาน และบันทึกการยืมวัสดุนั่งร้าน
      </p>

    </div>

  </div>

  <!-- APPROVER -->

  <div
    onclick="openLogin()"
    class="bg-white rounded-2xl shadow-sm p-10 cursor-pointer hover:shadow-lg transition"
  >

    <div class="text-center">

      <div class="text-6xl mb-6">
        ✅
      </div>

      <h3 class="text-2xl font-bold text-slate-800 mb-3">
        Approver
      </h3>

      <p class="text-slate-500">
        สำหรับผู้อนุมัติงานเท่านั้น
      </p>

    </div>

  </div>

</div>


  </main>

  <!-- LOGIN MODAL -->

  <div
    id="loginModal"
    class="hidden fixed inset-0 bg-black/50 flex items-center justify-center"
  >


<div class="bg-white rounded-2xl p-8 w-full max-w-md">

  <h2 class="text-2xl font-bold mb-6">
    Approver Login
  </h2>

  <div class="space-y-4">

    <input
      type="text"
      id="username"
      placeholder="Username"
      class="w-full border border-slate-300 rounded-lg p-3"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      class="w-full border border-slate-300 rounded-lg p-3"
    >

  </div>

  <div class="flex justify-end gap-3 mt-6">

    <button
      onclick="closeLogin()"
      class="bg-slate-300 px-5 py-2 rounded-lg"
    >
      Cancel
    </button>

    <button
      onclick="login()"
      class="bg-blue-600 text-white px-5 py-2 rounded-lg"
    >
      Login
    </button>

  </div>

</div>


  </div>

<script>

function goRequester() {

  window.location.href = "user.html";

}

function openLogin() {

  document.getElementById("loginModal")
    .style.display = "flex";

}

function closeLogin() {

  document.getElementById("loginModal")
    .style.display = "none";

}

function login() {

  const username =
    document.getElementById("username").value;

  const password =
    document.getElementById("password").value;

  const APPROVERS = [

    {
      username: "pongsathorn",
      password: "faci1347"
    },

    {
      username: "natthawan",
      password: "faci7158"
    }

  ];

  const validUser = APPROVERS.find(function(user){

    return (
      user.username === username &&
      user.password === password
    );

  });

  if(validUser){

    window.location.href = "approve.html";

  } else {

    alert("Invalid username or password");

  }

}

</script>

</body>
</html>
