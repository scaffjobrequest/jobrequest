<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Scaffold Management System</title>

  <script src="https://cdn.tailwindcss.com"></script>
<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
>

<link
  href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
>
</head>

<body class="bg-slate-100 min-h-screen font-[Prompt]">

  <!-- HEADER -->

  <header class="bg-slate-900 text-white shadow-lg">

<div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

  <div>

    <h1 class="text-2xl font-bold">
      Scaffold Management System
    </h1>

    <p class="text-slate-300 text-sm">
      Request & Tracking Portal
    </p>

  </div>

<nav class="flex gap-3 text-sm">

  <button
    id="menuRequest"
    class="menu-btn bg-blue-600 px-4 py-2 rounded text-white"
  >
    Submit Request
  </button>

  <button
    id="menuStatus"
    class="menu-btn bg-slate-700 px-4 py-2 rounded text-white"
  >
    Check Status
 </button>
  
  <button
    id="menuMaterial"
    class="menu-btn bg-slate-700 px-4 py-2 rounded text-white"
  >
    Material Log
</button>
</nav>


</div>

  </header>

  <!-- MAIN -->

  <main class="max-w-5xl mx-auto p-6">

<!-- REQUEST SECTION -->

<div
  id="requestSection"
  class="bg-white rounded-xl shadow-sm p-6"
>

  <h2 class="text-xl font-bold text-slate-800 mb-6">
    Scaffold Request Form
  </h2>

  <form id="requestForm" class="space-y-6">

    <!-- REQUESTER -->

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

      <div>

        <label class="block text-sm font-semibold mb-2">
          Requester Name
        </label>

        <input
          type="text"
          id="requesterName"
          placeholder="ชื่อผู้แจ้งงาน"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >

      </div>

      <div>

        <label class="block text-sm font-semibold mb-2">
          Phone Number
        </label>

        <input
          type="text"
          id="phoneNumber"
          placeholder="เบอร์ติดต่อผู้แจ้งงาน"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >

      </div>

    </div>

    <!-- WORK -->

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <div>

        <label class="block text-sm font-semibold mb-2">
          Work Action
        </label>

        <select
          id="workAction"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >

          <option value="">Select</option>
          <option value="Install">Install</option>
          <option value="Remove">Remove</option>

        </select>

      </div>

      <div>

        <label class="block text-sm font-semibold mb-2">
          Work Type
        </label>

        <select
          id="workType"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >

          <option value="">Select</option>
          <option value="CM">CM</option>
          <option value="MSD">MSD</option>
          <option value="QSD">QSD</option>
          <option value="ANSD">ANSD</option>
          <option value="BD">BD</option>

        </select>

      </div>

    </div>

    <!-- DESCRIPTION -->

    <!-- DESCRIPTION -->

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

  <!-- DESCRIPTION -->

  <div>

    <label class="block text-sm font-semibold mb-2">
      Description
    </label>

    <textarea
      id="description"
      rows="4"
      required
      placeholder="ชื่องานและรายละเอียด"
      class="w-full border border-slate-300 rounded-lg p-3"
    ></textarea>

  </div>

  <!-- QUANTITY -->

  <div>

    <label class="block text-sm font-semibold mb-2">
      Quantity (m³)
    </label>

    <input
      type="number"
      id="quantity"
      min="0"
      step="0.01"
      placeholder="ex. 72"
      required
      class="w-full border border-slate-300 rounded-lg p-3"
    >

  </div>

</div>

    <!-- LOCATION -->

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <div>

        <label class="block text-sm font-semibold mb-2">
          Location
        </label>

        <select
          id="location"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >

          <option value="">Select</option>
          <option value="Internal">Internal</option>
          <option value="External">External</option>

        </select>

      </div>

      <div>

        <label class="block text-sm font-semibold mb-2">
          Area
        </label>

        <input
          type="text"
          id="area"
          placeholder="ex. PM1"
          required
          class="w-full border border-slate-300 rounded-lg p-3"
        >

      </div>

    </div>

    <!-- CONTACT -->

    <div>

      <label class="block text-sm font-semibold mb-2">
        Contact
      </label>

      <input
        type="text"
        id="contact"
        placeholder="ชื่อหน้างานและเบอร์ 4 ตัวท้าย"
        required
        class="w-full border border-slate-300 rounded-lg p-3"
      >

    </div>

    <!-- DUE DATE -->

    <div>

      <label class="block text-sm font-semibold mb-2">
        Due Date
      </label>

      <input
        type="date"
        id="dueDate"
        required
        class="w-full border border-slate-300 rounded-lg p-3"
      >

    </div>

    <!-- PHOTO -->

    <div>

      <label class="block text-sm font-semibold mb-2">
        Upload Photos (Max 5)
      </label>

      <input
  type="file"
  id="photos"
  multiple
  accept="image/*"
  onchange="addMoreFiles(event)"
  class="w-full border border-slate-300 rounded-lg p-3"
>

<div
  id="selectedFilesText"
  class="text-sm text-slate-500 mt-2"
>
  No images selected
</div>

    </div>

    <!-- REMARK -->

    <div>

      <label class="block text-sm font-semibold mb-2">
        Remark
      </label>

      <textarea
        id="remark"
        rows="4"
        class="w-full border border-slate-300 rounded-lg p-3"
      ></textarea>

    </div>

    <!-- BUTTON -->

    <div class="pt-4">

      <button
        type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold"
      >
        Submit Request
      </button>

    </div>

  </form>

</div>
<!-- MATERIAL SECTION -->

<div
  id="materialSection"
  class="hidden bg-white rounded-xl shadow-sm p-6 mt-6"
>

  <h2 class="text-xl font-bold text-slate-800 mb-6">
    Material Borrowing Log
  </h2>

  <form
    id="materialForm"
    class="space-y-6"
  >

    <!-- CONTRACTOR -->

    <div>

      <label class="block text-sm font-semibold mb-2">
        Contractor Name
      </label>

      <input
        type="text"
        id="contractor"
        required
        placeholder="Example: TPSC"
        class="w-full border border-slate-300 rounded-lg p-3"
      >

    </div>

    <!-- MATERIAL ITEMS -->

<div>

  <div class="flex justify-between items-center mb-4">

    <label class="block text-sm font-semibold">
      Material Items
    </label>

    <button
      type="button"
      id="addMaterialRow"
      class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm"
    >
      + Add Item
    </button>

  </div>

  <div
    id="materialItems"
    class="space-y-4"
  >

  </div>

</div>

    <!-- BUTTON -->

    <button
      type="submit"
      class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold"
    >
      Save Material Log
    </button>

  </form>

</div>
<!-- STATUS SECTION -->

<div
  id="statusSection"
  class="hidden bg-white rounded-xl shadow-sm p-6 mt-6"
>

  <h2 class="text-xl font-bold text-slate-800 mb-6">
    Check Request Status
  </h2>

  <div class="flex gap-3 mb-6">

    <input
      type="text"
      id="searchJobId"
      placeholder="Enter Job ID or WO"
      class="flex-1 border border-slate-300 rounded-lg p-3"
    >

    <button
      id="searchBtn"
      class="bg-blue-600 text-white px-6 rounded-lg"
    >
      Search
    </button>

  </div>

  <div
    id="statusResult"
    class="hidden border border-slate-200 rounded-lg p-6 bg-slate-50"
  >

   <div id="resultContainer"></div>

</div>

<!-- LOADING OVERLAY -->

<div
  id="loadingOverlay"
  class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-50"
>

  <div class="bg-white px-6 py-4 rounded-xl shadow-lg flex items-center gap-3">

    <div
      class="w-5 h-5 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"
    ></div>

    <span class="font-medium text-slate-700">
      Loading...
    </span>

  </div>

</div>

</main>

  <script>

const API_URL =
'https://script.google.com/macros/s/AKfycbx6QV2vjlV_Oyp-5gQrke1smMrGORzccv2o_Q-Wf2PPYBNDwWgtLAp-KCMwjgxjEyPW/exec';
let currentJobId = '';
    let selectedFiles = [];
    function showLoading() {

  document
  .getElementById('loadingOverlay')
  .classList.remove('hidden');

}

function hideLoading() {

  document
  .getElementById('loadingOverlay')
  .classList.add('hidden');

}
// ====================
// MENU ELEMENTS
// ====================

const requestSection =
document.getElementById('requestSection');

const statusSection =
document.getElementById('statusSection');

const menuRequest =
document.getElementById('menuRequest');

const menuStatus =
document.getElementById('menuStatus');

const materialSection =
document.getElementById('materialSection');

const menuMaterial =
document.getElementById('menuMaterial');

// ====================
// ACTIVE MENU
// ====================

function setActiveMenu(activeBtn) {

  document.querySelectorAll('.menu-btn')
  .forEach(btn => {

    btn.classList.remove('bg-blue-600');
    btn.classList.add('bg-slate-700');

  });

  activeBtn.classList.remove('bg-slate-700');
  activeBtn.classList.add('bg-blue-600');

}

// ====================
// REQUEST MENU
// ====================

menuRequest.addEventListener('click', () => {

  requestSection.classList.remove('hidden');

  materialSection.classList.add('hidden');

  statusSection.classList.add('hidden');

  setActiveMenu(menuRequest);

});

// ====================
// STATUS MENU
// ====================

menuStatus.addEventListener('click', () => {

  requestSection.classList.add('hidden');

  materialSection.classList.add('hidden');

  statusSection.classList.remove('hidden');

  setActiveMenu(menuStatus);

});
    // ====================
// MATERIAL MENU
// ====================

menuMaterial.addEventListener('click', () => {

  requestSection.classList.add('hidden');

  statusSection.classList.add('hidden');

  materialSection.classList.remove('hidden');

  setActiveMenu(menuMaterial);

});

// ====================
// SUBMIT REQUEST
// ====================

document
.getElementById('requestForm')
.addEventListener('submit', async function(e) {

  e.preventDefault();
  showLoading();

const submitButton =
e.target.querySelector('button[type="submit"]');

submitButton.disabled = true;

submitButton.innerText = 'Submitting...';

  const files = selectedFiles;
  const data = {

    requesterName:
    document.getElementById('requesterName').value,

    phoneNumber:
    document.getElementById('phoneNumber').value,

    workAction:
    document.getElementById('workAction').value,

    workType:
    document.getElementById('workType').value,

    description:
    document.getElementById('description').value,

    quantity:
    document.getElementById('quantity').value,

    location:
    document.getElementById('location').value,

    area:
    document.getElementById('area').value,

    contact:
    document.getElementById('contact').value,

    dueDate:
    document.getElementById('dueDate').value,

    remark:
    document.getElementById('remark').value

  };

  try {

    const response = await fetch(API_URL, {

      method: 'POST',

      body: JSON.stringify(data)

    });
    const result = await response.json();

    if(result.success) {

  hideLoading();

  submitButton.disabled = false;

  submitButton.innerText =
    'Submit Request';

  document.body.insertAdjacentHTML(

    'beforeend',

    `

    <div
      id="successPopup"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
    >

      <div class="bg-white rounded-2xl p-8 w-full max-w-md text-center">

        <h2 class="text-2xl font-bold mb-4 text-green-600">
          Request Submitted
        </h2>

        <p class="text-slate-500 mb-4">
          Your Job ID
        </p>

        <div
          class="bg-slate-100 rounded-xl p-4 text-2xl font-bold mb-6"
          id="jobIdText"
        >
          ${result.jobId}
        </div>

        <div class="flex gap-3">

          <button
            onclick="copyJobId()"
            class="flex-1 bg-blue-600 text-white py-3 rounded-xl"
          >
            Copy Job ID
          </button>

          <button
            onclick="closeSuccessPopup()"
            class="flex-1 bg-slate-300 py-3 rounded-xl"
          >
            Close
          </button>

        </div>

      </div>

    </div>

    `
  );

} else {

  alert('Error submitting request');

}
    hideLoading();

submitButton.disabled = false;

submitButton.innerText = 'Submit Request';

  } catch(error) {

    console.error(error);

    alert('System Error');
hideLoading();

submitButton.disabled = false;

submitButton.innerText = 'Submit Request';
  }

});
// ====================
// ADD MATERIAL ROW
// ====================

function addMaterialRow() {

  const container =
  document.getElementById('materialItems');

  const row = document.createElement('div');

  row.className =
    'grid grid-cols-1 md:grid-cols-4 gap-4';

  row.innerHTML = `

    <select
      class="materialType border border-slate-300 rounded-lg p-3"
      required
    >

      <option value="">
        Material
      </option>

      <option value="Pipe">
        Pipe
      </option>

      <option value="Board">
        Board
      </option>

      <option value="Clamp Fixed">
        Clamp Fixed
      </option>

      <option value="Clamp Swivel">
        Clamp Swivel
      </option>

      <option value="Ladder">
        Ladder
      </option>

    </select>

    <input
      type="text"
      class="materialSize border border-slate-300 rounded-lg p-3"
      placeholder="Size"
      required
    >

    <input
      type="number"
      class="materialQty border border-slate-300 rounded-lg p-3"
      placeholder="Quantity"
      min="1"
      required
    >

    <button
      type="button"
      class="bg-red-600 text-white rounded-lg"
      onclick="this.parentElement.remove()"
    >
      Remove
    </button>

  `;

  container.appendChild(row);

}
    document
.getElementById('addMaterialRow')
.addEventListener('click', addMaterialRow);

// DEFAULT ROW

addMaterialRow();
// ====================
// SUBMIT MATERIAL LOG
// ====================

document
.getElementById('materialForm')
.addEventListener('submit', async function(e) {

  e.preventDefault();

  showLoading();

  const submitButton =
  e.target.querySelector('button[type="submit"]');

  submitButton.disabled = true;

  submitButton.innerText =
    'Saving...';

  const rows =
document.querySelectorAll('#materialItems > div');

const items = [];

rows.forEach(row => {

  items.push({

    materialType:
      row.querySelector('.materialType').value,

    size:
      row.querySelector('.materialSize').value,

    quantity:
      row.querySelector('.materialQty').value

  });

});

const data = {

  type: 'material',

  contractor:
    document.getElementById('contractor').value,

  items: items

};

  try {

    const response = await fetch(API_URL, {

      method: 'POST',

      body: JSON.stringify(data)

    });

    const result =
      await response.json();

    if(result.success) {

      alert(
        `Material Log Saved\n\n` +
        `Borrow ID: ${result.borrowId}`
      );

      document
      .getElementById('materialForm')
      .reset();

    } else {

      alert('Save Failed');

    }

  } catch(error) {

    console.error(error);

    alert('System Error');

  }

  hideLoading();

  submitButton.disabled = false;

  submitButton.innerText =
    'Save Material Log';

});
// ====================
// SEARCH JOB
// ====================

document
.getElementById('searchBtn')
.addEventListener('click', async () => {

  const searchText =
  document.getElementById('searchJobId').value;

  if(!searchText) {

    alert('Please enter Job ID or WO');

    return;

  }

  showLoading();

  const searchButton =
  document.getElementById('searchBtn');

  searchButton.disabled = true;

  searchButton.innerText = 'Searching...';

  try {

    const response = await fetch(
      `${API_URL}?action=getJob&jobId=${encodeURIComponent(searchText)}`
    );

    const results = await response.json();

    if(results.error) {

      alert('Job not found');

      hideLoading();

      searchButton.disabled = false;

      searchButton.innerText = 'Search';

      return;

    }

    document
    .getElementById('statusResult')
    .classList.remove('hidden');

    const resultContainer =
    document.getElementById('resultContainer');

    resultContainer.innerHTML = '';

    results.forEach(result => {

      currentJobId = result.jobId;

      const dueDate =
      new Date(result.dueDate);

      const formattedDate =
      dueDate.toLocaleDateString(
        'en-GB',
        {
          day: '2-digit',
          month: 'short',
          year: 'numeric'
        }
      );

      let rejectedHTML = '';

      if(
        result.status === 'Rejected' &&
        result.rejectedReason
      ) {

        rejectedHTML = `
          <p class="mt-2">
            <strong>Rejected Reason:</strong>
            ${result.rejectedReason}
          </p>
        `;

      }

      let woHTML = '';

      if(result.workOrder) {

        woHTML = `
          <p class="mt-2">
            <strong>Work Order:</strong>
            ${result.workOrder}
          </p>
        `;

      }

      let woInputHTML = '';

      if(
        result.status === 'Approved' &&
        !result.workOrder
      ) {

        woInputHTML = `

          <div class="mt-4">

            <label class="block font-bold mb-2">
              Work Order
            </label>

            <div class="flex gap-2">

              <input
                type="text"
                id="workOrderInput"
                placeholder="Enter Work Order"
                class="border border-slate-300 rounded-lg p-2 flex-1"
              >

              <button
  id="saveWOButton"
  onclick="saveWorkOrder('${result.jobId}')"
  class="bg-blue-600 text-white px-4 py-2 rounded-lg"
>
  Save WO
</button>

            </div>

          </div>

        `;

      }

      const card = `

        <div class="bg-slate-100 rounded-xl p-6 mb-4">

          <p>
            <strong>Job ID:</strong>
            ${result.jobId}
          </p>

          <p class="mt-2">
            <strong>Status:</strong>
            ${result.status}
          </p>

          <p class="mt-2">
            <strong>Work Type:</strong>
            ${result.workType}
          </p>

          <p class="mt-2">
            <strong>Description:</strong>
            ${result.description}
          </p>

          <p class="mt-2">
            <strong>Area:</strong>
            ${result.area}
          </p>

          <p class="mt-2">
            <strong>Due Date:</strong>
            ${formattedDate}
          </p>

          ${rejectedHTML}

          ${woHTML}

          ${woInputHTML}

        </div>

      `;

      resultContainer.innerHTML += card;

    });

  } catch(error) {

    console.error(error);

    alert('Search Error');

  }

  hideLoading();

  searchButton.disabled = false;

  searchButton.innerText = 'Search';

});
async function saveWorkOrder() {

  const workOrder =
    document.getElementById('workOrderInput').value;

  if(!workOrder) {

    alert('Please enter Work Order');

    return;

  }

  const saveButton =
    document.getElementById('saveWOButton');

  saveButton.disabled = true;

  showLoading();

  saveButton.innerText = 'Saving...';

  try {

    const response = await fetch(

      `${API_URL}?action=updateWO&jobId=${currentJobId}&workOrder=${encodeURIComponent(workOrder)}`

    );

    const result = await response.json();

    if(result.success) {

      hideLoading();

      alert('Work Order Saved');

      location.reload();

    } else {

      hideLoading();

      alert('Save Failed');

    }

  } catch(error) {

    console.error(error);

    hideLoading();

    alert('Save Error');

  }

  saveButton.disabled = false;

  saveButton.innerText = 'Save WO';

}
    function copyJobId() {

  const text =
    document.getElementById('jobIdText')
    .innerText;

  navigator.clipboard.writeText(text);

  alert('Copied');

}

function closeSuccessPopup() {

  location.reload();

}
    function addMoreFiles(event) {

  const newFiles =
    Array.from(event.target.files);

  selectedFiles = [

    ...selectedFiles,

    ...newFiles

  ];

  document.getElementById(
    'selectedFilesText'
  ).innerText =

    `${selectedFiles.length} image(s) selected`;

}
</script>
</body>
</html>
