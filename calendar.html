<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>Scaffold Calendar</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
    rel="stylesheet"
  >

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

</head>

<body class="bg-slate-100">

  <div class="max-w-7xl mx-auto p-6">

    <div class="bg-white rounded-xl shadow p-6">

      <div id="calendar"></div>

    </div>

  </div>

<script>

const API_URL =
'https://script.google.com/macros/s/AKfycbx6QV2vjlV_Oyp-5gQrke1smMrGORzccv2o_Q-Wf2PPYBNDwWgtLAp-KCMwjgxjEyPW/exec';

document.addEventListener('DOMContentLoaded', async function() {

  const response =
    await fetch(
      `${API_URL}?action=getPendingJobs`
    );

  const jobs =
    await response.json();

  const events = jobs.map(job => ({

    title:
      `${job.jobId} | ${job.workType}`,

    start:
      job.dueDate,

    backgroundColor:
      getColor(job.workType),

    borderColor:
      getColor(job.workType),

    extendedProps: {

      area: job.area,
      quantity: job.quantity,
      description: job.description

    }

  }));

  const calendarEl =
    document.getElementById('calendar');

  const calendar =
    new FullCalendar.Calendar(calendarEl, {

      initialView: 'dayGridMonth',

      height: 'auto',

      events: events,

      eventClick(info) {

        alert(

          `Job ID: ${info.event.title}\n\n` +

          `Area: ${info.event.extendedProps.area}\n` +

          `Qty: ${info.event.extendedProps.quantity}\n\n` +

          `${info.event.extendedProps.description}`

        );

      }

    });

  calendar.render();

});

function getColor(type) {

  switch(type) {

    case 'CM':
      return '#2563eb';

    case 'MSD':
      return '#ea580c';

    case 'QSD':
      return '#16a34a';

    case 'BD':
      return '#dc2626';

    default:
      return '#64748b';

  }

}

</script>

</body>
</html>
